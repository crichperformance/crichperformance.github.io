<!DOCTYPE html>
<html>

<head>

<title>Apply | Crich Performance</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#0e0e0e;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:90%;
max-width:600px;
text-align:center;
}

h1{

}

input{

}

button{
background:#ff4d4d;
border:none;
padding:12px 25px;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

</style>

</head>

<body>

<div class="container">

<h1>Apply to Work With Us</h1>

<form>

<input type="text" placeholder="Your Name" required>

<input type="email" placeholder="Email Address" required>

<input type="text" placeholder="Business Name">

<input type="text" placeholder="Instagram URL">

<input type="text" placeholder="Monthly Ad Budget">

<button type="submit">Submit Application</button>

</form>

</div>

</html>
